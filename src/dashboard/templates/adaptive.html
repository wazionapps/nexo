<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXO Brain — Adaptive Personality</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>

<body class="bg-gray-950 text-slate-200">

  <!-- Sidebar -->
  <aside class="fixed left-0 top-0 bottom-0 w-14 bg-slate-900 border-r border-slate-800 flex flex-col items-center py-4 z-50">
    <!-- Logo -->
    <a href="/" class="mb-6 flex items-center justify-center w-8 h-8">
      <img src="/static/nexo-logo.png" alt="NEXO" class="w-7 h-7" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">

        <span class="text-white text-xs font-bold font-display">N</span>
      </div>
    </a>

    <!-- Nav icons -->
    <nav class="flex flex-col items-center gap-1 flex-1">
      <!-- Dashboard -->
      <a href="/" title="Dashboard" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
        </svg>
      </a>
      <!-- Operations -->
      <a href="/ops" title="Operations" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
      </a>
      <!-- Calendar -->
      <a href="/calendar" title="Calendar" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
        </svg>
      </a>
      <!-- Inbox -->
      <a href="/inbox" title="Inbox" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors relative">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 9v.906a2.25 2.25 0 01-1.183 1.981l-6.478 3.488M2.25 9v.906a2.25 2.25 0 001.183 1.981l6.478 3.488m8.839 2.51l-4.66-2.51m0 0l-1.023-.55a2.25 2.25 0 00-2.134 0l-1.022.55m0 0l-4.661 2.51m16.5 1.615a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V8.844a2.25 2.25 0 011.183-1.981l7.5-4.039a2.25 2.25 0 012.134 0l7.5 4.039a2.25 2.25 0 011.183 1.98V19.5z" />
        </svg>
        <span id="inbox-badge" class="absolute top-1 right-1 w-2 h-2 bg-violet-500 rounded-full hidden"></span>
      </a>

      <div class="w-6 border-t border-slate-800 my-1"></div>

      <!-- Memory -->
      <a href="/memory" title="Memory" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776" />
        </svg>
      </a>
      <!-- Graph -->
      <a href="/graph" title="Graph" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
        </svg>
      </a>
      <!-- Sessions -->
      <a href="/sessions" title="Sessions" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </a>
      <!-- Somatic -->
      <a href="/somatic" title="Somatic" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
      </a>
      <!-- Adaptive (ACTIVE) -->
      <a href="/adaptive" title="Adaptive" class="w-9 h-9 flex items-center justify-center rounded-lg bg-slate-800 text-slate-200 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
        </svg>
      </a>
    </nav>

    <!-- Trust score -->
    <div class="mt-auto flex flex-col items-center gap-0.5">
      <span class="text-xs uppercase tracking-wider text-slate-600">Trust</span>
      <span id="sidebar-trust" class="text-xs font-mono font-medium text-slate-400">--</span>
    </div>
  </aside>

  <!-- Main -->
  <main class="ml-14 min-h-screen bg-gray-950 text-slate-200">
    <header class="h-12 border-b border-slate-800/50 flex items-center px-6">
      <h1 class="text-sm font-display font-semibold">Adaptive Personality</h1>
    </header>
    <div class="p-6">
      <div class="grid grid-cols-2 gap-4 max-w-4xl mb-6">
        <!-- Current Mode card -->
        <div class="bg-slate-900/50 border border-slate-800/50 rounded-lg p-4">
          <div class="text-xs uppercase tracking-wider text-slate-400 font-medium mb-3">Current Mode</div>
          <div id="mode" class="mb-2"></div>
          <p id="mode-desc" class="text-xs text-slate-400"></p>
        </div>
        <!-- Weights card -->
        <div class="bg-slate-900/50 border border-slate-800/50 rounded-lg p-4">
          <div class="text-xs uppercase tracking-wider text-slate-400 font-medium mb-3">Signal Weights</div>
          <div id="weights" class="space-y-2"></div>
        </div>
      </div>
      <!-- History table -->
      <div class="bg-slate-900/50 border border-slate-800/50 rounded-lg p-4 max-w-4xl">
        <div class="text-xs uppercase tracking-wider text-slate-400 font-medium mb-3">Mode History</div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-left text-slate-400 border-b border-slate-800">
              <th class="py-2.5 pr-4 font-medium text-xs uppercase tracking-wide">Time</th>
              <th class="py-2.5 pr-4 font-medium text-xs uppercase tracking-wide">Mode</th>
              <th class="py-2.5 pr-4 font-medium text-xs uppercase tracking-wide">Score</th>
              <th class="py-2.5 font-medium text-xs uppercase tracking-wide">Signals</th>
            </tr></thead>
            <tbody id="history" class="divide-y divide-slate-800/50"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    const MODE_META = {
      FLOW:    { desc: 'Operating at peak alignment. User is in flow state — proactive suggestions welcome.' },
      NORMAL:  { desc: 'Standard operating mode. Balanced tone and normal autonomy levels.' },
      TENSION: { desc: 'Elevated tension detected. Ultra-concise mode active — no preamble, direct resolution only.' },
    };

    function modeBadge(mode) {
      if (mode === 'FLOW')    return `<span class="px-2 py-1 rounded-md text-xs font-medium bg-emerald-500/10 text-emerald-400">FLOW</span>`;
      if (mode === 'TENSION') return `<span class="px-2 py-1 rounded-md text-xs font-medium bg-red-500/10 text-red-400">TENSION</span>`;
      return `<span class="px-2 py-1 rounded-md text-xs font-medium bg-blue-500/10 text-blue-400">NORMAL</span>`;
    }

    function formatTime(ts) {
      if (!ts) return '—';
      try {
        const d = new Date(ts);
        return d.toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' });
      } catch { return ts; }
    }

    function loadData() {
      fetch('/api/adaptive')
        .then(r => r.json())
        .then(data => {
          const mode = data.state?.mode || data.mode || 'NORMAL';

          // Current Mode
          document.getElementById('mode').innerHTML = modeBadge(mode);
          document.getElementById('mode-desc').textContent =
            data.modes?.[mode] || MODE_META[mode]?.desc || '';

          // Signal Weights
          const weights = data.weights || {};
          const weightEntries = Object.entries(weights).sort((a, b) => b[1] - a[1]);
          const weightsEl = document.getElementById('weights');

          if (!weightEntries.length) {
            weightsEl.innerHTML = '<p class="text-sm text-slate-500">No signal weights configured.</p>';
          } else {
            weightsEl.innerHTML = weightEntries.map(([name, value]) => {
              const pct = Math.min(Math.max(value * 100, 0), 100);
              return `<div class="flex items-center gap-2">
  <span class="text-sm text-slate-300 w-24">${name}</span>
  <div class="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
    <div class="h-full bg-violet-500 rounded-full" style="width:${pct.toFixed(0)}%"></div>
  </div>
  <span class="text-xs font-mono text-slate-400 w-12 text-right">${pct.toFixed(0)}%</span>
</div>`;
            }).join('');
          }

          // History
          const history = (data.history || []).slice(0, 50);
          const tbody = document.getElementById('history');

          if (!history.length) {
            tbody.innerHTML = '<tr><td colspan="4" class="py-6 text-center text-slate-500">No history recorded yet.</td></tr>';
          } else {
            tbody.innerHTML = history.map(h => {
              const m = h.mode || 'NORMAL';
              const signals = (h.signals || '').toString().replace(/</g, '&lt;');
              const score = h.score != null ? Number(h.score).toFixed(2) : '—';
              return `<tr class="text-slate-300">
  <td class="py-2 pr-4 font-mono text-xs">${formatTime(h.timestamp)}</td>
  <td class="py-2 pr-4">${modeBadge(m)}</td>
  <td class="py-2 pr-4 font-mono text-sm">${score}</td>
  <td class="py-2 text-slate-400 text-sm">${signals || '—'}</td>
</tr>`;
            }).join('');
          }
        })
        .catch(err => {
          document.getElementById('history').innerHTML =
            `<tr><td colspan="4" class="py-4 text-center text-red-400 text-xs">Failed to load: ${err.message}</td></tr>`;
        });
    }

    // Trust score
    fetch('/api/stats')
      .then(r => r.json())
      .then(data => {
        if (data.trust_score != null) {
          document.getElementById('sidebar-trust').textContent = Number(data.trust_score).toFixed(0);
        }
      })
      .catch(() => {});

    loadData();
  </script>

</body>
</html>
