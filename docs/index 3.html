<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2;url=https://github.com/wazionapps/nexo/wiki">
    <title>Docs — NEXO Brain</title>
    <link rel="canonical" href="https://github.com/wazionapps/nexo/wiki">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
    <div>
        <img src="/assets/logo-64.png" alt="NEXO Brain" style="width:48px;height:48px;border-radius:12px;margin-bottom:24px;">
        <h1 style="font-size:24px;font-weight:700;margin-bottom:12px;">Redirecting to Documentation</h1>
        <p style="color:var(--text-muted);font-size:16px;margin-bottom:24px;">Taking you to the NEXO Brain Wiki on GitHub...</p>
        <div style="width:40px;height:40px;border:3px solid var(--dark-border);border-top-color:var(--purple);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px;"></div>
        <a href="https://github.com/wazionapps/nexo/wiki" style="font-size:14px;">Click here if not redirected</a>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
