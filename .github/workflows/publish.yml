name: Publish to all channels

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # 1. Publish nexo-brain to npm
      - name: Publish nexo-brain to npm
        run: npm publish --access public || echo "Version already exists"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 2. Publish OpenClaw plugin to npm
      - name: Publish OpenClaw plugin to npm
        working-directory: openclaw-plugin
        run: |
          npm install --legacy-peer-deps
          npm run build
          npm publish --access public || echo "Version already exists"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 3. Publish ClawHub skill
      - name: Publish ClawHub skill
        run: |
          npx clawhub@latest publish ./clawhub-skill \
            --slug nexo-brain \
            --name "NEXO Brain" \
            --version ${GITHUB_REF_NAME#v} \
            --tags latest \
            --changelog "Release ${GITHUB_REF_NAME}" \
            --no-input || echo "ClawHub publish failed (may need auth)"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      # 4. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

      # 5. Update version on nexo-brain.com (gh-pages)
      - name: Update landing page version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git fetch origin gh-pages
          git checkout gh-pages
          sed -i "s/\"softwareVersion\": \"[^\"]*\"/\"softwareVersion\": \"${VERSION}\"/" index.html
          if git diff --quiet; then
            echo "No version change needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: update version to ${VERSION} on landing page"
            git push origin gh-pages
          fi
