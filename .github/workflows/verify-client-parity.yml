name: Verify client parity

on:
  push:
    branches:
      - main
      - dev
      - beta
  pull_request:

jobs:
  verify-client-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify shared-brain client parity
        run: python3 scripts/verify_client_parity.py
